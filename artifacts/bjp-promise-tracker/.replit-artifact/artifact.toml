kind = "web"
previewPath = "/"
title = "BJP Promise Tracker"
version = "1.0.0"
id = "artifacts/bjp-promise-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25557

[services.development]
run = "pnpm --filter @workspace/bjp-promise-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bjp-promise-tracker", "run", "build" ]
publicDir = "artifacts/bjp-promise-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25557"
BASE_PATH = "/"
